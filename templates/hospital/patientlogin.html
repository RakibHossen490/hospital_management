<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Patient Login</title>

    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", sans-serif;
        background: #f4f6f9;
        color: #1f2937;
      }

      .page-shell {
        min-height: calc(100vh - 120px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      .login-card {
        width: 100%;
        max-width: 420px;
        background: #ffffff;
        border-radius: 10px;
        border: 1px solid #e5e7eb;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      }

      /* PANEL */
      .form-panel {
        padding: 40px 40px;
      }

      /* TITLE */
      .form-panel h2 {
        text-align: center;
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .form-panel p {
        text-align: center;
        font-size: 0.9rem;
        color: #6b7280;
        margin-bottom: 25px;
      }

      /* FORM */
      .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 18px;
        padding-left: 4px;
      }

      .form-group label {
        font-size: 0.9rem;
        font-weight: 500;
        color: #374151;
        margin-bottom: 6px;
      }

      .form-group input {
        width: 100%;
        padding: 11px 12px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #f9fafb;
        font-size: 0.9rem;
        transition: all 0.2s;
      }

      .form-group input:focus {
        border-color: #2563eb;
        background: #ffffff;
        outline: none;
      }

      /* BUTTON */
      .btn-custom {
        width: 100%;
        padding: 11px;
        border: none;
        border-radius: 6px;
        background: #2563eb;
        color: white;
        font-weight: 500;
        font-size: 0.95rem;
        margin-top: 10px;
        transition: background 0.2s;
      }

      .btn-custom:hover {
        background: #1e40af;
      }

      /* FOOT */
      .form-note {
        text-align: center;
        margin-top: 20px;
        font-size: 0.9rem;
        color: #6b7280;
      }

      .form-note a {
        color: #2563eb;
        font-weight: 500;
        text-decoration: none;
      }

      .form-note a:hover {
        text-decoration: underline;
      }

      /* RESPONSIVE */
      @media (max-width: 576px) {
        .form-panel {
          padding: 30px 25px;
        }
      }
    </style>
  </head>

  <body>
    {% include "hospital/navbar.html" %}

    <div class="page-shell">
      <div class="login-card">
        <div class="form-panel">

          <h2>Patient Login</h2>
          <p>Enter your credentials to continue</p>

          <form method="post">
            {% csrf_token %}

            <div class="form-group">
              <label>Username</label>
              {{ form.username }}
            </div>

            <div class="form-group">
              <label>Password</label>
              {{ form.password }}
            </div>

            <button type="submit" class="btn-custom">Login</button>

            <div class="form-note">
              Don’t have an account? <a href="patientsignup">Signup here</a>
            </div>
          </form>

        </div>
      </div>
    </div>

    {% include "hospital/footer.html" %}
  </body>
</html>
