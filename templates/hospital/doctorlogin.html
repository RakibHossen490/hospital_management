<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Doctor Login</title>

    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", sans-serif;
        background: #f4f6f9;
        color: #1f2937;
      }

      .page-shell {
        min-height: calc(100vh - 120px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      .login-card {
        width: 100%;
        max-width: 700px;
        background: #ffffff;
        border-radius: 10px;
        border: 1px solid #e5e7eb;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      }

      /* FORM PANEL */
      .form-panel {
        padding: 45px 55px;
      }

      /* TITLE */
      .form-panel h2 {
        text-align: center;
        font-size: 1.6rem;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .form-panel p {
        text-align: center;
        font-size: 0.9rem;
        color: #6b7280;
        margin-bottom: 30px;
      }

      /* FORM ROW */
      .form-row-custom {
        display: flex;
        align-items: center;
        margin-bottom: 20px;
        padding-left: 10px;
      }

      .form-row-custom label {
        width: 130px;
        font-size: 0.9rem;
        font-weight: 500;
        color: #374151;
        padding-left: 5px;
      }

      .form-row-custom input {
        flex: 1;
        padding: 11px 12px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #f9fafb;
        transition: all 0.2s;
      }

      .form-row-custom input:focus {
        border-color: #2563eb;
        background: #ffffff;
        outline: none;
      }

      /* BUTTON */
      .btn-login {
        width: 100%;
        padding: 11px;
        border: none;
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        font-weight: 500;
        font-size: 0.95rem;
        margin-top: 10px;
        transition: background 0.2s;
      }

      .btn-login:hover {
        background: #1e40af;
      }

      /* FOOT TEXT */
      .form-note {
        margin-top: 22px;
        font-size: 0.9rem;
        text-align: center;
        color: #6b7280;
      }

      .form-note a {
        color: #2563eb;
        font-weight: 500;
        text-decoration: none;
      }

      .form-note a:hover {
        text-decoration: underline;
      }

      /* RESPONSIVE */
      @media (max-width: 768px) {
        .form-panel {
          padding: 30px 25px;
        }

        .form-row-custom {
          flex-direction: column;
          align-items: flex-start;
          padding-left: 0;
        }

        .form-row-custom label {
          width: 100%;
          margin-bottom: 6px;
        }
      }
    </style>
  </head>

  <body>
    {% include "hospital/navbar.html" %}

    <div class="page-shell">
      <div class="login-card">
        <div class="form-panel">

          <h2>Doctor Login</h2>
          <p>Enter your credentials to continue</p>

          <form method="post">
            {% csrf_token %}

            <div class="form-row-custom">
              <label>Username</label>
              {{ form.username }}
            </div>

            <div class="form-row-custom">
              <label>Password</label>
              {{ form.password }}
            </div>

            <button type="submit" class="btn-login">Login</button>
          </form>

          <div class="form-note">
            Don’t have an account? <a href="doctorsignup">Signup</a>
          </div>

        </div>
      </div>
    </div>

    {% include "hospital/footer.html" %}
  </body>
</html>
