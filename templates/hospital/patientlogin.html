<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Patient Login</title>

    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    />

    <style>
      body {
        background: linear-gradient(to right, #dfe9f3, #ffffff);
        font-family: "Roboto", sans-serif;
      }

      .login-card {
        margin-top: 80px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      }

      .login-header {
        background: linear-gradient(to right, #0072ff, #8811c5);
        color: white;
        text-align: center;
        padding: 20px;
        border-radius: 15px 15px 0 0;
        font-weight: bold;
      }

      .form-control {
        border-radius: 10px;
      }

      .btn-custom {
        border-radius: 20px;
        padding: 10px 30px;
        background: #0072ff;
        color: white;
        border: none;
      }

      .btn-custom:hover {
        background: #0056b3;
      }
    </style>
  </head>

  <body>
    {% include "hospital/navbar.html" %}

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card login-card">
            <div class="login-header">Patient Login</div>

            <div class="card-body">
              <form method="post">
                {% csrf_token %}

                <div class="form-group">
                  <label>Username</label>
                  {{ form.username }}
                </div>

                <div class="form-group">
                  <label>Password</label>
                  {{ form.password }}
                </div>

                <div class="text-center mt-4">
                  <button type="submit" class="btn-custom">Login</button>
                </div>

                <div class="text-center mt-3">
                  Do not have account? <a href="patientsignup">Signup here</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <br /><br />

    {% include "hospital/footer.html" %}
  </body>
</html>
