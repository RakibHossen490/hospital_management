<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>LazyCoder || MD Rakib Hossen Howladar</title>

    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    />

    <style>
      body {
        background-color: #b6bde7;
      }
      .note {
        text-align: center;
        height: 80px;
        background: linear-gradient(to right, #0072ff, #8811c5);
        color: #fff;
        font-weight: bold;
        line-height: 80px;
      }
      .form-content {
        padding: 5%;
        border: 1px solid #ced4da;
      }
      .btnSubmit {
        border-radius: 1.5rem;
        background: #0062cc;
        color: white;
        padding: 8px 20px;
      }
    </style>
  </head>

  <body>
    {% include "hospital/navbar.html" %}

    <br /><br /><br /><br />

    <form method="post">
      {% csrf_token %}

      <div class="container register-form">
        <div class="form">
          <div class="note">
            <p>Add New Admin To Hospital</p>
          </div>

          <div class="form-content">
            <!-- ✅ এখানে form.as_p -->
            {{ form.as_p }}

            <div class="text-center">
              <button type="submit" class="btnSubmit">Submit</button>
            </div>

            <div class="text-center mt-3">
              Already have an account? <a href="adminlogin">Login here</a>
            </div>
          </div>
        </div>
      </div>
    </form>

    {% include "hospital/footer.html" %}
  </body>
</html>
