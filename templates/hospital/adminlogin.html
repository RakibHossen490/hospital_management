<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>LazyCoder || MD Rakib Hossen Howladar</title>

    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    />

    <style>
      body {
        background-color: #b6bde7;
        font-family: "Roboto", sans-serif;
      }

      .note {
        text-align: center;
        height: 80px;
        background: linear-gradient(to right, #0072ff, #8811c5);
        color: #fff;
        font-weight: bold;
        line-height: 80px;
      }

      .form-content {
        padding: 5%;
        border: 1px solid #ced4da;
        margin-bottom: 2%;
        background: #fff;
        border-radius: 10px;
      }

      .btnSubmit {
        border-radius: 1.5rem;
        background: #0062cc;
        color: white;
        padding: 8px 25px;
      }

      /* 🔥 form.as_p styling */
      .form-content p {
        margin-bottom: 15px;
      }

      .form-content input {
        width: 100%;
        padding: 10px;
        border-radius: 1.5rem;
        border: 1px solid #ced4da;
      }

      .form-content label {
        font-weight: 600;
      }
    </style>
  </head>

  <body>
    {% include "hospital/navbar.html" %}

    <br /><br /><br /><br />

    <form method="post">
      {% csrf_token %}

      <div class="container register-form">
        <div class="form">
          <div class="note">
            <p>Admin Login Page</p>
          </div>

          <div class="form-content">
            {{ form.as_p }}

            <div class="text-center mt-3">
              <button type="submit" class="btnSubmit">Login</button>
            </div>

            <div class="text-center mt-3">
              Do not have account? <a href="adminsignup">Signup here</a>
            </div>
          </div>
        </div>
      </div>
    </form>

    <br /><br /><br />

    {% include "hospital/footer.html" %}
  </body>
</html>
